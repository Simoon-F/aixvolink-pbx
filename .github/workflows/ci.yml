name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: phase1-ci-only
          MYSQL_DATABASE: aixvolinkpbx_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pphase1-ci-only"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Download locked dependencies
        run: go mod download
      - name: Check formatting
        run: make fmt-check
      - name: Vet
        run: make vet
      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --timeout=5m
      - name: Test
        run: make test
      - name: Race test
        run: make test-race
      - name: MySQL and network integration tests
        env:
          AIXVOLINKPBX_TEST_MYSQL_DSN: root:phase1-ci-only@tcp(127.0.0.1:3306)/aixvolinkpbx_test?parseTime=true
        run: make integration-test
      - name: SIP parser fuzz smoke
        run: make fuzz-smoke
      - name: Install SIPp
        run: sudo apt-get update && sudo apt-get install --yes sip-tester
      - name: SIPp protocol tests
        run: make sipp-test
      - name: Media performance gate
        run: make media-bench
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          make vulncheck
      - name: License audit
        run: |
          go install github.com/google/go-licenses@v1.6.0
          make license-check

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - name: Build Linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -o aixvolinkpbx-linux-${GOARCH} ./cmd/aixvolinkpbx
